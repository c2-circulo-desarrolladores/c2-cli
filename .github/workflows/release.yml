name: Release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: c2-windows-x86_64.zip
            is_windows: true

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: c2-linux-x86_64

          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: c2-macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: c2-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # Windows: zip
      - name: Package (Windows)
        if: matrix.is_windows
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\c2.exe dist\c2.exe
          powershell Compress-Archive -Path dist\c2.exe -DestinationPath ${{ matrix.asset_name }}
        shell: cmd

      # Linux/Mac: binario directo
      - name: Package (Unix)
        if: "!matrix.is_windows"
        run: |
          cp target/${{ matrix.target }}/release/c2 ${{ matrix.asset_name }}

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}